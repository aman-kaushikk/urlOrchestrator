spring:
  application:
    name: urlOrchestrator
  datasource:
    hikari:
      connection-timeout: 30000
      idle-timeout: 30000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
  profiles:
    active:
      - dev